<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
    :root {
      --pink:   #FF2D78;
      --yellow: #FFD600;
      --cyan:   #00E5FF;
      --purple: #9B00FF;
      --green:  #00E676;
      --dark:   #0A0A0F;
      --card-bg: rgba(255,255,255,0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
    }

    /* ─── AGE GATE ─────────────────────────────────────────────── */
    #age-gate {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #0A0A0F 0%, #1a001a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
    }
    #age-gate .logo-gate {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 4rem; letter-spacing: -2px;
      background: linear-gradient(90deg, var(--pink), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #age-gate p { font-size: 1.1rem; opacity: .7; text-align: center; max-width: 320px; line-height: 1.6; }
    #age-gate .gate-btns { display: flex; gap: 16px; }
    #age-gate button {
      padding: 14px 40px; border-radius: 50px; border: none; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 900;
      letter-spacing: 1px; transition: transform .2s, box-shadow .2s;
    }
    #age-gate button:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255,45,120,.4); }
    #age-gate .btn-yes { background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; }
    #age-gate .btn-no  { background: rgba(255,255,255,.1); color: rgba(255,255,255,.6); }
    #age-gate button:hover { transform: translateY(-2px); }

    /* ─── NAV ───────────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      padding: 18px 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,10,15,.95);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .nav-logo {
      font-family: 'Black Han Sans', sans-serif; font-size: 1.8rem;
      letter-spacing: -1px;
      background: linear-gradient(90deg, var(--pink), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { color: rgba(255,255,255,.7); text-decoration: none; font-weight: 700; font-size: .9rem; letter-spacing: 1px; text-transform: uppercase; transition: color .2s; }
    .nav-links a:hover { color: var(--pink); }
    .nav-cta {
      padding: 10px 28px; border-radius: 50px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; font-weight: 900; font-size: .9rem;
      text-decoration: none; letter-spacing: 1px;
      transition: transform .2s, box-shadow .2s;
    }
    .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,45,120,.5); }

    /* ─── HERO ──────────────────────────────────────────────────── */
    #hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; padding-top: 80px;
    }
    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 80% at 20% 50%, rgba(155,0,255,.3) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 60% at 80% 30%, rgba(255,45,120,.25) 0%, transparent 55%),
                  radial-gradient(ellipse 50% 50% at 60% 80%, rgba(0,229,255,.15) 0%, transparent 50%);
    }
    /* floating bubbles */
    .bubble {
      position: absolute; border-radius: 50%; opacity: .15;
      animation: float 8s ease-in-out infinite;
    }
    .b1 { width:300px;height:300px; background:var(--pink);   top:-60px; left:10%;  animation-delay:0s; }
    .b2 { width:200px;height:200px; background:var(--yellow); top:60%;  left:5%;   animation-delay:2s; }
    .b3 { width:150px;height:150px; background:var(--cyan);   top:20%;  right:8%;  animation-delay:1s; }
    .b4 { width:250px;height:250px; background:var(--purple); bottom:-50px; right:15%; animation-delay:3s; }
    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-30px) scale(1.05); }
    }

    .hero-content {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 1200px; padding: 0 60px; gap: 60px;
    }
    .hero-text { flex: 1; }
    .hero-badge {
      display: inline-block; padding: 6px 18px; border-radius: 50px;
      background: rgba(255,45,120,.15); border: 1px solid rgba(255,45,120,.4);
      color: var(--pink); font-weight: 800; font-size: .8rem; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 20px;
    }
    .hero-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(3.5rem, 7vw, 7rem);
      line-height: .95; letter-spacing: -3px; margin-bottom: 24px;
    }
    .hero-title .gradient-text {
      background: linear-gradient(90deg, var(--pink), var(--yellow), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      font-size: 1.2rem; opacity: .7; line-height: 1.7; max-width: 440px; margin-bottom: 36px;
    }
    .hero-actions { display: flex; gap: 16px; align-items: center; }
    .btn-primary {
      padding: 16px 44px; border-radius: 50px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; font-weight: 900; font-size: 1rem; letter-spacing: 1px;
      text-decoration: none; transition: transform .2s, box-shadow .2s;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255,45,120,.5); }
    .btn-ghost {
      padding: 16px 36px; border-radius: 50px;
      border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.8);
      font-weight: 700; font-size: 1rem; text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .btn-ghost:hover { border-color: var(--pink); color: var(--pink); }

    /* product sphere showcase */
    .hero-visual { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
    .sphere-main {
      width: 340px; height: 340px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.5), rgba(255,45,120,.8) 40%, rgba(155,0,255,.9) 80%, #1a001a);
      box-shadow: 0 30px 80px rgba(255,45,120,.5), inset 0 -20px 40px rgba(0,0,0,.3);
      animation: pulse-sphere 4s ease-in-out infinite;
      position: relative;
    }
    .sphere-main::after {
      content: 'BOOMBALL'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-family: 'Black Han Sans', sans-serif; font-size: 1.5rem; color: rgba(255,255,255,.9);
      letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,.5);
    }
    @keyframes pulse-sphere {
      0%,100% { transform: scale(1) rotate(-2deg); box-shadow: 0 30px 80px rgba(255,45,120,.5); }
      50%      { transform: scale(1.04) rotate(2deg); box-shadow: 0 40px 100px rgba(155,0,255,.6); }
    }
    .sphere-orbit {
      position: absolute; border-radius: 50%;
      animation: orbit 6s linear infinite;
    }
    .so1 {
      width: 80px; height: 80px; top: -10px; right: 60px;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.4), rgba(0,229,255,.8), #006080);
      box-shadow: 0 10px 30px rgba(0,229,255,.5);
    }
    .so2 {
      width: 60px; height: 60px; bottom: 20px; left: 40px;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.4), rgba(255,214,0,.8), #805500);
      box-shadow: 0 10px 30px rgba(255,214,0,.5);
      animation-delay: -3s;
    }
    @keyframes orbit {
      0%   { transform: translateY(0) scale(1); }
      50%  { transform: translateY(-20px) scale(1.1); }
      100% { transform: translateY(0) scale(1); }
    }

    /* ─── FLAVORS ───────────────────────────────────────────────── */
    #flavors {
      padding: 120px 60px;
      max-width: 1200px; margin: 0 auto;
    }
    .section-header { text-align: center; margin-bottom: 70px; }
    .section-label {
      display: inline-block; color: var(--pink); font-weight: 800;
      font-size: .85rem; letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem); letter-spacing: -2px; line-height: 1;
    }
    .section-title span {
      background: linear-gradient(90deg, var(--pink), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .section-sub { margin-top: 16px; opacity: .6; font-size: 1.1rem; }

    .flavors-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
    }
    .flavor-card {
      border-radius: 28px; overflow: hidden; position: relative;
      padding: 40px 30px 36px; cursor: pointer;
      transition: transform .3s, box-shadow .3s;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,0.07);
    }
    .flavor-card:hover { transform: translateY(-10px); }
    .flavor-card::before {
      content: ''; position: absolute; inset: 0; opacity: .15;
      background: var(--fg); transition: opacity .3s;
    }
    .flavor-card:hover::before { opacity: .25; }

    .fc-1 { --fg: linear-gradient(135deg, #FF2D78, #FF6B6B); }
    .fc-2 { --fg: linear-gradient(135deg, #9B00FF, #FF2D78); }
    .fc-3 { --fg: linear-gradient(135deg, #00E5FF, #00B4D8); }
    .fc-4 { --fg: linear-gradient(135deg, #FFD600, #FF6B00); }
    .fc-5 { --fg: linear-gradient(135deg, #00E676, #00B09B); }
    .fc-6 { --fg: linear-gradient(135deg, #FF6B6B, #FFD600); }

    .fc-1:hover { box-shadow: 0 20px 60px rgba(255,45,120,.3); }
    .fc-2:hover { box-shadow: 0 20px 60px rgba(155,0,255,.3); }
    .fc-3:hover { box-shadow: 0 20px 60px rgba(0,229,255,.3); }
    .fc-4:hover { box-shadow: 0 20px 60px rgba(255,214,0,.3); }
    .fc-5:hover { box-shadow: 0 20px 60px rgba(0,230,118,.3); }
    .fc-6:hover { box-shadow: 0 20px 60px rgba(255,107,107,.3); }

    .flavor-sphere {
      width: 120px; height: 120px; border-radius: 50%;
      margin: 0 auto 24px;
      background: var(--fg);
      box-shadow: 0 15px 40px rgba(0,0,0,.3);
      transition: transform .3s;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .flavor-card:hover .flavor-sphere { transform: scale(1.1) rotate(10deg); }
    .flavor-name {
      font-family: 'Black Han Sans', sans-serif; font-size: 1.6rem;
      letter-spacing: -1px; text-align: center; margin-bottom: 8px;
    }
    .flavor-abv {
      text-align: center; font-size: .85rem; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase; opacity: .5;
      margin-bottom: 16px;
    }
    .flavor-desc { text-align: center; font-size: .9rem; opacity: .65; line-height: 1.6; }
    .flavor-tag {
      display: inline-block; margin-top: 20px; padding: 6px 16px;
      border-radius: 50px; font-size: .75rem; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase;
      background: rgba(255,255,255,.1); color: rgba(255,255,255,.8);
      border: 1px solid rgba(255,255,255,.15);
      width: 100%; text-align: center;
    }

    /* ─── STATS STRIP ───────────────────────────────────────────── */
    #stats {
      padding: 60px;
      background: linear-gradient(135deg, rgba(255,45,120,.12) 0%, rgba(155,0,255,.12) 100%);
      border-top: 1px solid rgba(255,255,255,.06);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .stats-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-around; gap: 40px;
      flex-wrap: wrap;
    }
    .stat-item { text-align: center; }
    .stat-num {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 3.5rem; letter-spacing: -2px;
      background: linear-gradient(90deg, var(--pink), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-label { font-size: .85rem; font-weight: 700; letter-spacing: 2px; opacity: .5; text-transform: uppercase; }
    .stat-divider { width: 1px; height: 70px; background: rgba(255,255,255,.1); }

    /* ─── MISSION ───────────────────────────────────────────────── */
    #mission {
      padding: 140px 60px;
      position: relative;
    }
    .mission-bg { display: none; }
    .mission-inner {
      max-width: 1200px; margin: 0 auto; position: relative; z-index: 1;
      display: flex; align-items: center; gap: 80px;
      will-change: transform;
    }
    .mission-visual { flex: 1; display: flex; justify-content: center; }
    .mission-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
    }
    .mg-card {
      border-radius: 20px; padding: 28px 24px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,.08);
      transition: transform .3s;
    }
    .mg-card:hover { transform: scale(1.03); }
    .mg-icon { font-size: 2rem; margin-bottom: 12px; }
    .mg-title { font-weight: 800; font-size: 1rem; margin-bottom: 6px; }
    .mg-text { font-size: .85rem; opacity: .6; line-height: 1.6; }

    .mission-text { flex: 1; }
    .mission-text .section-label { text-align: left; }
    .mission-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2.5rem, 4vw, 4rem); letter-spacing: -2px; margin: 16px 0 24px;
      line-height: 1;
    }
    .mission-title span {
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .mission-body { opacity: .7; line-height: 1.8; margin-bottom: 36px; font-size: 1.05rem; }
    .mission-checks { display: flex; flex-direction: column; gap: 14px; margin-bottom: 36px; }
    .mission-check {
      display: flex; align-items: center; gap: 14px; font-weight: 700;
    }
    .check-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green), #00997a);
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; flex-shrink: 0;
    }

    /* ─── SOCIAL PROOF ──────────────────────────────────────────── */
    #reviews {
      padding: 120px 60px;
      background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(155,0,255,.1) 0%, transparent 60%);
    }
    .reviews-grid {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
    }
    .review-card {
      border-radius: 24px; padding: 32px 28px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,.08);
      transition: transform .3s;
    }
    .review-card:hover { transform: translateY(-6px); }
    .review-stars { font-size: 1rem; margin-bottom: 16px; letter-spacing: 2px; }
    .review-text { font-size: .95rem; opacity: .75; line-height: 1.7; margin-bottom: 20px; font-style: italic; }
    .review-author { display: flex; align-items: center; gap: 12px; }
    .review-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .9rem;
    }
    .review-name { font-weight: 800; font-size: .9rem; }
    .review-location { font-size: .78rem; opacity: .5; }

    /* ─── WHERE TO BUY ──────────────────────────────────────────── */
    #where {
      padding: 100px 60px; max-width: 1100px; margin: 0 auto;
    }
    .where-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 60px;
    }
    .where-card {
      border-radius: 20px; padding: 32px 20px; text-align: center;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,.08);
      transition: transform .3s, box-shadow .3s;
    }
    .where-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(255,45,120,.2); }
    .where-icon { font-size: 2.5rem; margin-bottom: 16px; }
    .where-name { font-weight: 800; font-size: 1rem; }

    /* ─── CTA SECTION ───────────────────────────────────────────── */
    #cta {
      padding: 120px 60px; text-align: center;
      background: linear-gradient(135deg, #1a0020 0%, #220040 40%, #001a2a 100%);
    }
    .cta-bg { display: none; }
    .cta-sphere-bg { display: none; }
    .cta-content { max-width: 700px; margin: 0 auto; }
    .cta-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(3rem, 6vw, 6rem); letter-spacing: -3px;
      line-height: .95; margin-bottom: 24px;
    }
    .cta-title span {
      background: linear-gradient(90deg, var(--pink), var(--yellow), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .cta-sub { font-size: 1.2rem; opacity: .7; margin-bottom: 40px; line-height: 1.6; }
    .cta-email {
      display: flex; max-width: 480px; margin: 0 auto; gap: 0;
      background: rgba(255,255,255,.1); border-radius: 50px; padding: 6px 6px 6px 24px;
      border: 1px solid rgba(255,255,255,.15);
    }
    .cta-email input {
      flex: 1; background: none; border: none; outline: none;
      color: #fff; font-family: 'Nunito', sans-serif; font-size: .95rem;
      placeholder-color: rgba(255,255,255,.4);
    }
    .cta-email input::placeholder { color: rgba(255,255,255,.4); }
    .cta-email button {
      padding: 12px 28px; border-radius: 50px; border: none;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; font-weight: 900; font-size: .9rem; letter-spacing: 1px;
      cursor: pointer; transition: transform .2s;
      font-family: 'Nunito', sans-serif;
    }
    .cta-email button:hover { transform: scale(1.03); }

    /* ─── FOOTER ────────────────────────────────────────────────── */
    footer {
      padding: 60px; border-top: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
      gap: 32px;
    }
    .footer-logo {
      font-family: 'Black Han Sans', sans-serif; font-size: 2rem;
      background: linear-gradient(90deg, var(--pink), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .footer-links { display: flex; gap: 32px; flex-wrap: wrap; }
    .footer-links a { color: rgba(255,255,255,.5); text-decoration: none; font-size: .85rem; font-weight: 700; transition: color .2s; }
    .footer-links a:hover { color: var(--pink); }
    .footer-social { display: flex; gap: 14px; }
    .social-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; cursor: pointer; transition: background .2s;
      text-decoration: none; color: #fff;
    }
    .social-btn:hover { background: rgba(255,45,120,.3); border-color: var(--pink); }
    .footer-copy { width: 100%; text-align: center; font-size: .8rem; opacity: .35; padding-top: 20px; border-top: 1px solid rgba(255,255,255,.05); }

    /* ─── SCROLL INDICATOR ──────────────────────────────────────── */
    .scroll-indicator {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: bounce-down 2s ease-in-out infinite;
    }
    .scroll-indicator span { font-size: .7rem; letter-spacing: 2px; opacity: .4; text-transform: uppercase; }
    .scroll-arrow { width: 20px; height: 20px; border-right: 2px solid rgba(255,255,255,.3); border-bottom: 2px solid rgba(255,255,255,.3); transform: rotate(45deg); }
    @keyframes bounce-down {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(8px); }
    }

    /* ─── RESPONSIVE ────────────────────────────────────────────── */
    @media (max-width: 900px) {
      nav { padding: 16px 24px; }
      .nav-links { display: none; }
      .hero-content { flex-direction: column; padding: 20px 24px; text-align: center; }
      .hero-text .hero-sub { max-width: 100%; }
      .hero-actions { justify-content: center; }
      .hero-visual { order: -1; }
      .sphere-main { width: 220px; height: 220px; }
      #flavors, #reviews, #mission, #cta, #where { padding: 80px 24px; }
      .flavors-grid, .reviews-grid { grid-template-columns: 1fr; }
      .mission-inner { flex-direction: column; }
      .where-grid { grid-template-columns: repeat(2,1fr); }
      #stats { padding: 40px 24px; }
      .stat-divider { display: none; }
      footer { padding: 40px 24px; flex-direction: column; align-items: flex-start; }
    }
  
body { margin:0; padding:0; background: #0A0A0F; }
</style></head><body><section id="cta">
  <div class="cta-bg"></div>
  <div class="cta-sphere-bg"></div>
  <div class="cta-content">
    <div class="section-label" style="margin-bottom:20px;">Lançamento em breve</div>
    <h2 class="cta-title">SEJA O<br><span>PRIMEIRO</span><br>A EXPLODIR.</h2>
    <p class="cta-sub">Cadastre seu email e garanta acesso antecipado ao lançamento — com desconto exclusivo de early bird.</p>
    <div class="cta-email">
      <input type="email" placeholder="seu@email.com">
