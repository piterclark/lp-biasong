              - heading "1. Format Furniture" [level=3] [ref=e175]:
                - strong [ref=e176]: "1."
                - strong [ref=e177]:
                  - link "Format Furniture" [ref=e178] [cursor=pointer]:
                    - /url: https://format.furniture/
              - paragraph:
                - img "Format Furniture; best websites for furniture"
              - paragraph [ref=e179]: Format Furniture knows about custom-made furniture and crushes it in website design. This first screen grabs your attention with an airy photo from the company’s portfolio and minimal text.
              - heading "What I like:" [level=4] [ref=e180]
              - paragraph [ref=e181]: The website's overall look and feel are minimalist, aesthetic, and professional. The white background gives the website an open and bright feel, while the high-quality images of furniture products add a touch of elegance and luxury.
              - heading "2. Case Furniture" [level=3] [ref=e182]:
                - strong [ref=e183]: "2."
                - strong [ref=e184]:
                  - link "Case Furniture" [ref=e185] [cursor=pointer]:
                    - /url: https://casefurniture.com/
              - paragraph:
                - img "case furniture; best websites for furniture"
              - paragraph [ref=e186]: In short, the website design of Case Furniture is stunning. The elegant typography and luxurious and high-quality images of furniture products all over the website create an exclusive and refined atmosphere.
              - heading "What I like:" [level=4] [ref=e187]
              - paragraph [ref=e188]:
                - text: The
                - link "grid layout" [ref=e189] [cursor=pointer]:
                  - /url: https://blog.hubspot.com/website/broken-grid-layouts?hubs_content=blog.hubspot.com/website/furniture-web-design&hubs_content-cta=grid-layout
                - text: below the fold consists only of product images with very sparse copy, which lets the furniture’s aesthetic really shine.
              - heading "3. Robinson Furniture" [level=3] [ref=e190]:
                - strong [ref=e191]: "3."
                - strong [ref=e192]:
                  - link "Robinson Furniture" [ref=e193] [cursor=pointer]:
                    - /url: https://www.robinsonfurniture.net/
              - paragraph:
                - img "robinson website for furniture design"
              - paragraph [ref=e194]: Royalty and luxury paired with modernism and rustic flair. This website conveys all these qualities thanks to outstanding furniture pictures and sophisticated italic typography.
              - generic [ref=e199]:
                - heading "Free Website Design Inspiration Guide" [level=3] [ref=e200]
                - paragraph [ref=e201]: 77 Brilliant Examples of Homepages, Blogs & Landing Pages to Inspire You
                - list [ref=e202]:
