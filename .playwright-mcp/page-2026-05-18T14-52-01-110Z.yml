              - heading "4. Utilize color swatches." [level=3] [ref=e515]:
                - strong [ref=e516]: 4. Utilize color swatches.
              - paragraph [ref=e517]: Furniture pieces come in various colors and finishes, so customers need to see what each option looks like before making a purchase. Color swatches allow customers to easily visualize how different colors would look on the product they are interested in.
              - paragraph [ref=e518]: This feature also saves time for both the customer and the retailer as it reduces the need for physical samples or back-and-forth communication about color choices.
              - paragraph [ref=e519]: Pictures change according to the chosen color. Take this one step further by giving customers a dynamic representation of each color option.
              - paragraph [ref=e520]:
                - strong [ref=e521]: "Pro tip:"
                - text: Make color swatches viewable in a horizontal, scrollable list. Research by
                - link "Baymard" [ref=e522] [cursor=pointer]:
                  - /url: https://baymard.com/blog/mobile-interactive-color-swatches
                - text: found that 57% of sites don't show all the color swatches, leaving shoppers guessing at what they might look like on the product.
              - paragraph [ref=e523]: Moreover, the company found that, for the best user experience on a mobile device, brands should display all of the color swatches in a horizontal list that users can scroll through.
