              - paragraph [ref=e501]:
                - strong [ref=e502]: "Pro tip:"
                - text: Looking to DIY your furniture photography? It’s best to hire a professional photographer to snap photos of your furniture, but if you’re on a budget, here’s a tip from Brandon Sweet, a professional photographer and furniture maker.
              - paragraph [ref=e503]:
                - text: “While it may be tempting to accumulate a range of photography equipment, such as cameras, lenses, and lighting gear, I’ve discovered that the most significant progress is often achieved by starting with just one camera and one lens,” writes Sweet for
                - link "Fine Woodworking" [ref=e504] [cursor=pointer]:
