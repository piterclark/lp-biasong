        - button "Quanto tempo leva uma tatuagem ultra realista?" [ref=e153] [cursor=pointer]:
          - text: Quanto tempo leva uma tatuagem ultra realista?
          - img [ref=e155]
        - paragraph [ref=e157]: Depende do tamanho e complexidade. Peças pequenas levam de 4 a 8h. Retratos completos de 8 a 16h, geralmente divididos em 2 sessões. Sleevesfull de 30 a 60h ao longo de meses. Nunca pressionamos para terminar em menos tempo — um detalhe apressado arruína a obra inteira.
      - generic [ref=e158]:
        - button "Funciona em qualquer tom de pele?" [ref=e159] [cursor=pointer]:
          - text: Funciona em qualquer tom de pele?
          - img [ref=e161]
        - paragraph [ref=e163]: Sim, com adaptações técnicas. Em peles mais escuras, trabalhamos com contraste diferenciado e pigmentos específicos. Na consulta avaliamos seu tom e definimos a melhor abordagem para garantir o mesmo nível de realismo independente da tonalidade.
      - generic [ref=e164]:
        - button "Posso tatuar sobre uma tatuagem antiga?" [ref=e165] [cursor=pointer]:
          - text: Posso tatuar sobre uma tatuagem antiga?
          - img [ref=e167]
        - paragraph [ref=e169]: Em alguns casos sim, em outros não. Tatuagens antigas muito carregadas ou cicatrizadas de forma irregular podem comprometer o realismo. Avaliamos foto por foto na consulta. Se não for possível fazer ultra realismo com qualidade acima, somos honestos — não fazemos algo que não vai ficar impecável.
      - generic [ref=e170]:
        - button "Quanto custa? Como funciona o orçamento?" [ref=e171] [cursor=pointer]:
          - text: Quanto custa? Como funciona o orçamento?
          - img [ref=e173]
        - paragraph [ref=e175]: Cobramos por sessão (R$800 a R$1.200/sessão dependendo da complexidade) ou por obra fechada. Orçamento detalhado só após a consulta — não existe preço justo sem ver referências e entender o que você quer. A consulta é gratuita e sem compromisso.
      - generic [ref=e176]:
        - button "Como é o processo de cicatrização?" [ref=e177] [cursor=pointer]:
          - text: Como é o processo de cicatrização?
          - img [ref=e179]
        - paragraph [ref=e181]: "Fornecemos kit completo de cicatrização e um guia detalhado por escrito. Nos primeiros 15 dias: sem sol, sem piscina, sem academia intensa. A cura total leva de 3 a 6 semanas. Durante todo esse período, suporte direto via WhatsApp — qualquer dúvida, respondemos."
