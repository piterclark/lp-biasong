      - heading "Quem Somos" [level=2] [ref=e100]
      - generic [ref=e102]:
        - paragraph [ref=e103]: Com mais de 50 anos de história no Rio Grande do Sul, o Atacadão dos Móveis é uma das maiores redes de varejo de móveis da região, focado em oferecer soluções completas para o lar com qualidade e agilidade. Desde 2015, nossa missão é transformar o sonho da casa ideal em realidade, proporcionando móveis para todos os ambientes, incluindo cozinha, dormitórios, sala de estar, sofás e banheiro.
        - paragraph [ref=e104]: Nosso compromisso é resolver todas as necessidades em móveis com os melhores preços do mercado e entrega imediata, garantindo que cada cliente possa mobiliar seu lar com rapidez e praticidade. Atendemos principalmente ao público das classes C e D, mas nossa variedade de produtos também atrai clientes da classe B, oferecendo um amplo mix para atender diferentes estilos e necessidades.
        - paragraph [ref=e105]: "O Atacadão dos Móveis é mais do que uma loja de móveis: é o parceiro ideal para quem busca qualidade, preço justo e a agilidade de um estoque sempre disponível para atender ao seu lar."
