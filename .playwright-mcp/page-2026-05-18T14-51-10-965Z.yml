        - generic [ref=e255]:
          - heading "Uma segunda chance ao design." [level=3] [ref=e256]
          - paragraph [ref=e258]: Somos um e-commerce especializado na venda de móveis reembalados ou provenientes de saldos de indústria. Proporcionamos a chance de esses produtos serem acessados por quem sempre busca o melhor custo benefício.
      - listitem [ref=e259]:
        - generic [ref=e263]:
          - heading "Mas o que são produtos reembalados?" [level=3] [ref=e264]
          - paragraph [ref=e266]: São produtos vendidos online que foram devolvidos por consumidores por arrependimento. Esses são devidamente inspecionados, classificados e disponibilizados em nosso site com um desconto incrível.
    - heading "\"Dar uma nova chance aos produtos, às pessoas e ao planeta. Esta é nossa missão. Acreditamos em um futuro sustentável, pois sabemos que por trás de cada produto existem muitas histórias.\"" [level=2] [ref=e272]
    - generic [ref=e281]:
      - heading "Bom para as pessoas e para o planeta." [level=2] [ref=e282]
      - generic [ref=e283]:
        - paragraph [ref=e284]: As devoluções causadas por arrependimento geram milhões de produtos descartados todos os anos.
        - paragraph [ref=e285]: Além do prejuízo econômico, este é um problema de grande impacto ecológico enfrentado em todo o mundo.
        - paragraph [ref=e286]: Comprando na DOCK2 você economiza e ajuda a dar uma segunda chance a esses produtos, evitando desperdícios.
    - generic [ref=e291]:
      - heading "Sabe o que é Re-commerce?" [level=2] [ref=e292]
      - generic [ref=e293]:
        - paragraph [ref=e294]: Re-commerce é a prática de comprar e vender produtos usados ou recondicionados de forma online. Este mercado inclui itens como eletrônicos, roupas, móveis e outros bens, permitindo a reutilização e a redução de desperdício.
        - paragraph [ref=e295]: Esta prática está em alta na Europa e EUA e somos pioneiros em trazer o conceito para o mercado de móveis brasileiro.
